<!DOCTYPE html>
<html>
<head>
    <title>Task Deletion Confirmation & Feedback</title>
</head>

<body>

<h2>Task 7: Application Based JavaScript Dialogue Box</h2>

<button onclick="deleteTask()">Delete Task</button>

<script>

function deleteTask()
{
    alert("You are about to delete a task.");

    var result = confirm("Are you sure you want to delete this task?");

    if(result == true)
    {
        var reason = prompt("Enter the reason for deleting the task:");

        if(reason == "" || reason == null)
        {
            alert("Task deleted without any reason.");
        }
        else
        {
            alert("Task deleted successfully.\nReason: " + reason);
        }
    }
    else
    {
        alert("Task deletion has been cancelled.");
    }

}

</script>

</body>
</html>
